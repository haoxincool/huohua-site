<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火花 Huohua · 让每个瞬间都有回应</title>
<style>
  :root {
    --bg: #FBF7F0;
    --ink: #3D3A34;
    --muted: #8A857C;
    --accent: #E8833A;
    --line: #EFE9DF;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1C1A17;
      --ink: #EDE8DF;
      --muted: #9B958A;
      --accent: #F09A55;
      --line: #35312B;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .flame { font-size: 72px; margin-bottom: 16px; }
  h1 { font-size: 32px; margin-bottom: 8px; }
  .tagline { color: var(--muted); font-size: 17px; margin-bottom: 40px; }
  .desc { font-size: 15px; max-width: 480px; margin: 0 auto 40px; line-height: 1.8; }
  .links a {
    display: inline-block;
    margin: 0 12px;
    color: var(--accent);
    text-decoration: none;
    font-size: 15px;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 10px 24px;
  }
  .soon { margin-top: 40px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<main>
  <div class="flame">🔥</div>
  <h1>火花</h1>
  <p class="tagline">让每个瞬间都有回应</p>
  <p class="desc">
    随手记下此刻——文字、语音、照片都可以。<br>
    火花会在合适的时候回信：一句打趣、一份日记回顾、一封周末来信。<br>
    所有内容和 AI 都在你的手机本地，没有云端，没有别人。
  </p>
  <div class="links">
    <a href="privacy/">隐私政策</a>
    <a href="support/">支持与反馈</a>
  </div>
  <p class="soon">即将登陆 App Store · Coming soon</p>
</main>
</body>
</html>
